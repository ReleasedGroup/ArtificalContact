name: artificialcontact
metadata:
  template: artificialcontact-foundations@0.1.0
infra:
  provider: bicep
  path: infra
hooks:
  postprovision:
    run: node ./scripts/postprovision.mjs
    continueOnError: false
    interactive: true
services:
  api:
    dist: dist
    host: function
    language: js
    project: ./api
  web:
    dist: dist
    host: staticwebapp
    language: js
    project: ./web
