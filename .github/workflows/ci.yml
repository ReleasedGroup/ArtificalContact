name: validate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build
        env:
          BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_SHA: ${{ github.sha }}

      - name: Lint workspaces
        run: npm run lint

      - name: Test workspaces
        run: npm run test
