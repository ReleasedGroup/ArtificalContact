name: validate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build
        env:
          BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_SHA: ${{ github.sha }}

      - name: Check web bundle budget
        run: npm run bundle:check -w web

      - name: Lint workspaces
        run: npm run lint

      - name: Test workspaces
        run: npm run test

      - name: Validate Bicep
        run: az bicep build --only-show-errors --file infra/main.bicep --outfile infra/main.json

      - name: Run web accessibility scan
        run: npm run test:a11y --workspace @artificialcontact/web
