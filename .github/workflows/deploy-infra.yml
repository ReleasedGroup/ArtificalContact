name: deploy-infra

on:
  push:
    branches:
      - main
    paths:
      - azure.yaml
      - infra/**
      - .github/workflows/deploy-infra.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >
            appName=acn
            environmentName=${{ vars.AZURE_ENV_NAME || 'prod' }}
            location=${{ vars.AZURE_LOCATION || 'australiaeast' }}
            frontDoorCustomDomainHostName=${{ vars.FRONTDOOR_CUSTOM_DOMAIN || 'cdn-placeholder.example.com' }}
          deploymentName: artificialcontact-infra-${{ github.run_number }}
